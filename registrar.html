<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Viagem - Travel Diary</title>

  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <nav>
    <h1>Travel Diary</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Destinos</a></li>
      <li><a href="registrar.html" class="active">Registro de Viagens</a></li>
      <li><a href="#">Calendário</a></li>
    </ul>
    <a href="#" class="btn-nav">Próxima Viagem</a>
  </nav>
</header>

<form id="formNovaViagem">
  <div class="input-group">
    <label>Destino</label>
    <input type="text" id="inputDestino" placeholder="Ex: Tóquio, Lisboa...">
  </div>
  <div class="row">
    <div class="input-group">
      <label>Data da Viagem</label>
      <input type="date" id="inputData">
    </div>
    <div class="input-group">
      <label>Moeda</label>
      <select id="selectMoeda" class="input-color">
        <option>Selecione</option>
        <option>BRL</option>
        <option>USD</option>
        <option>EUR</option>
      </select>
    </div>
  </div>
  <div class="input-group">
    <label>Custo Estimado</label>
    <input type="number" id="inputCusto" placeholder="0,00">
  </div>
  <div class="input-group">
    <label>Itens da Mala</label>
    <div class="item-box">
      <input type="text" id="inputItemMala" placeholder="Ex: Passaporte">
      <button type="button" id="btnAdicionarItem">+</button>
    </div>
    <ul id="listaMalaTemporaria" style="margin-top:10px; list-style:none; padding:0;"></ul>
  </div>
  <button type="submit" class="btn-submit">Registrar Viagem</button>
</form>
    
</body>
</html>
